name: CompatHelper

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  compathelper:
    runs-on: ubuntu-latest
    steps:
      - uses: julia-actions/setup-julia@v3
        with:
          version: "1"
      - name: Run CompatHelper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPATHELPER_PRIV: ${{ secrets.DOCUMENTER_KEY }}
        run: |
          julia -e '
            using Pkg
            Pkg.add(name="CompatHelper")
            using CompatHelper
            CompatHelper.main()'
